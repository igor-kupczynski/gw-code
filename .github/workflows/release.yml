name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
      - name: Format check
        run: test -z "$(gofmt -l .)"
      - name: Vet
        run: go vet ./...
      - name: Unit tests
        run: go test -race ./...
      - name: Integration tests
        env:
          GW_CODE_INTEGRATION: "1"
        run: go test -race ./internal/integration -count=1
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: v2.17.0
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
